<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión - Bellas Boutique</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <h1 class="auth-title">Bellas Boutique</h1>
      <p class="auth-subtitle">Bienvenido de nuevo</p>

      <form onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label" for="email">Correo Electrónico</label>
          <input 
            type="email" 
            id="email" 
            class="form-input" 
            placeholder="tu@email.com" 
            required
          >
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Contraseña</label>
          <input 
            type="password" 
            id="password" 
            class="form-input" 
            placeholder="••••••••" 
            required
          >
        </div>

        <button type="submit" class="btn btn-primary btn-full">Iniciar Sesión</button>
      </form>

      <div class="mt-6 text-center space-y-2">
        <a href="#" class="link">¿Olvidaste tu contraseña?</a>
        <div style="font-size: 0.875rem; color: #6b7280; margin-top: 0.5rem;">
          ¿No tienes cuenta? 
          <a href="register.html" class="link-primary">Regístrate aquí</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    function handleLogin(event) {
      event.preventDefault();
      // Mock login - just redirect to home
      alert('¡Inicio de sesión exitoso!');
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
