<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bellas Boutique - Iniciar Sesión</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <h1 class="auth-title">Bellas Boutique</h1>
            <p class="auth-subtitle">Bienvenido de nuevo</p>

            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="email">Correo Electrónico</label>
                    <input 
                        type="email" 
                        id="email" 
                        class="form-input" 
                        placeholder="tu@email.com" 
                        required
                    >
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Contraseña</label>
                    <input 
                        type="password" 
                        id="password" 
                        class="form-input" 
                        placeholder="••••••••" 
                        required
                    >
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="isAdmin">
                    <label for="isAdmin" class="form-label" style="margin: 0; cursor: pointer;">
                        Iniciar sesión como administrador
                    </label>
                </div>

                <button type="submit" class="btn btn-primary">
                    Iniciar Sesión
                </button>
            </form>

            <div class="auth-links">
                <a href="#" class="auth-link">¿Olvidaste tu contraseña?</a>
                <div class="auth-link">
                    ¿No tienes cuenta? 
                    <a href="register.html" class="auth-link-accent">Regístrate aquí</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const isAdmin = document.getElementById('isAdmin').checked;
            
            if (isAdmin) {
                window.location.href = 'admin.html';
            } else {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
