<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrarse - Bellas Boutique</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <h1 class="auth-title">Bellas Boutique</h1>
      <p class="auth-subtitle">Crea tu cuenta</p>

      <form onsubmit="handleRegister(event)">
        <div class="form-group">
          <label class="form-label" for="name">Nombre *</label>
          <input 
            type="text" 
            id="name" 
            class="form-input" 
            placeholder="María" 
            required
          >
        </div>

        <div class="form-group">
          <label class="form-label" for="lastName">Apellido *</label>
          <input 
            type="text" 
            id="lastName" 
            class="form-input" 
            placeholder="González" 
            required
          >
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Correo Electrónico *</label>
          <input 
            type="email" 
            id="email" 
            class="form-input" 
            placeholder="tu@email.com" 
            required
          >
        </div>

        <div class="form-group">
          <label class="form-label" for="phone">Teléfono *</label>
          <input 
            type="tel" 
            id="phone" 
            class="form-input" 
            placeholder="+506 8888-8888" 
            required
          >
        </div>

        <div class="form-group">
          <label class="form-label" for="address">Dirección *</label>
          <input 
            type="text" 
            id="address" 
            class="form-input" 
            placeholder="San José, Costa Rica" 
            required
          >
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Contraseña *</label>
          <input 
            type="password" 
            id="password" 
            class="form-input" 
            placeholder="Mín. 8 caracteres" 
            minlength="8"
            required
          >
          <p class="form-hint">Al menos 8 caracteres</p>
        </div>

        <button type="submit" class="btn btn-primary btn-full mt-4">Registrarse</button>
      </form>

      <div class="mt-6 text-center">
        <p style="font-size: 0.875rem; color: #6b7280;">
          ¿Ya tienes cuenta? 
          <a href="login.html" class="link-primary">Inicia sesión aquí</a>
        </p>
      </div>
    </div>
  </div>

  <script>
    function handleRegister(event) {
      event.preventDefault();
      // Mock registration - redirect to login
      alert('¡Registro exitoso! Por favor inicia sesión.');
      window.location.href = 'login.html';
    }
  </script>
</body>
</html>
