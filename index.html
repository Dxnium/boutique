<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bellas Boutique - Catálogo</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">Bellas Boutique</a>
            <div class="nav-links">
                <a href="index.html" class="nav-link">
                    <span>🏠</span>
                    <span class="nav-text">Inicio</span>
                </a>
                <a href="support.html" class="nav-link">
                    <span>❓</span>
                    <span class="nav-text">Soporte</span>
                </a>
                <a href="cart.html" class="nav-link cart-link">
                    <span>🛒</span>
                    <span class="nav-text">Carrito</span>
                    <span class="cart-badge" id="cartBadge">0</span>
                </a>
                <a href="profile.html" class="nav-link">
                    <span>👤</span>
                    <span class="nav-text">Perfil</span>
                </a>
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- Hero Section -->
        <div class="hero-section">
            <h1>Bienvenido a Bellas Boutique</h1>
            <p class="hero-subtitle">Descubre nuestra elegante colección</p>
        </div>

        <!-- Category Filter -->
        <div class="category-filter" id="categoryFilter">
            <button class="category-btn active" data-category="Todo">Todo</button>
            <button class="category-btn" data-category="Vestidos">Vestidos</button>
            <button class="category-btn" data-category="Blusas">Blusas</button>
            <button class="category-btn" data-category="Zapatos">Zapatos</button>
            <button class="category-btn" data-category="Accesorios">Accesorios</button>
            <button class="category-btn" data-category="Joyería">Joyería</button>
        </div>

        <!-- Product Grid -->
        <div class="product-grid" id="productGrid"></div>
    </div>

    <script src="data.js"></script>
    <script src="cart-utils.js"></script>
    <script src="script.js"></script>
</body>
</html>
