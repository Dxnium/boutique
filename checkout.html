<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bellas Boutique - Pago</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">Bellas Boutique</a>
            <div class="nav-links">
                <a href="index.html" class="nav-link">
                    <span>🏠</span>
                    <span class="nav-text">Inicio</span>
                </a>
                <a href="support.html" class="nav-link">
                    <span>❓</span>
                    <span class="nav-text">Soporte</span>
                </a>
                <a href="cart.html" class="nav-link cart-link">
                    <span>🛒</span>
                    <span class="nav-text">Carrito</span>
                    <span class="cart-badge" id="cartBadge">0</span>
                </a>
                <a href="profile.html" class="nav-link">
                    <span>👤</span>
                    <span class="nav-text">Perfil</span>
                </a>
            </div>
        </div>
    </nav>

    <div class="container">
        <h1 class="page-title">Pago</h1>
        <div class="checkout-layout" id="checkoutContent"></div>
    </div>

    <script src="data.js"></script>
    <script src="cart-utils.js"></script>
    <script>
        let selectedPayment = 'card';

        function renderCheckout() {
            const cart = getCart();
            
            if (cart.length === 0) {
                window.location.href = 'cart.html';
                return;
            }

            const total = getCartTotal();
            const container = document.getElementById('checkoutContent');

            container.innerHTML = `
                <div style="display: flex; flex-direction: column; gap: 1.5rem;">
                    <div class="checkout-section">
                        <h2 class="section-title">Selecciona Método de Pago</h2>
                        <div class="payment-methods">
                            <button class="payment-option active" onclick="selectPayment('card')" id="paymentCard">
                                <span>💳</span>
                                <span>Tarjeta de Crédito / Débito</span>
                            </button>
                            <button class="payment-option" onclick="selectPayment('sinpe')" id="paymentSinpe">
                                <span>📱</span>
                                <span>SINPE Móvil</span>
                            </button>
                            <button class="payment-option" onclick="selectPayment('transfer')" id="paymentTransfer">
                                <span>🏦</span>
                                <span>Transferencia Bancaria</span>
                            </button>
                        </div>
                    </div>

                    <div class="checkout-section">
                        <h2 class="section-title">Detalles de Pago</h2>
                        <div id="paymentDetails"></div>
                    </div>
                </div>

                <div class="order-summary">
                    <h2 class="summary-title">Resumen de Pedido</h2>
                    <div style="margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 1px solid #e5e7eb;">
                        ${cart.map(item => `
                            <div class="summary-row" style="font-size: 0.875rem; margin-bottom: 0.75rem;">
                                <span style="color: #6b7280;">${item.name} x ${item.quantity}</span>
                                <span>$${(item.price * item.quantity).toFixed(2)}</span>
                            </div>
                        `).join('')}
                    </div>
                    <div class="summary-row">
                        <span>Subtotal</span>
                        <span>$${total.toFixed(2)}</span>
                    </div>
                    <div class="summary-row">
                        <span>Envío</span>
                        <span>Gratis</span>
                    </div>
                    <hr class="summary-divider">
                    <div class="summary-total">
                        <span>Total</span>
                        <span class="total-amount">$${total.toFixed(2)}</span>
                    </div>
                    <button class="btn btn-primary" onclick="handleConfirmPurchase()">
                        Confirmar Compra
                    </button>
                </div>
            `;

            updatePaymentDetails();
        }

        function selectPayment(method) {
            selectedPayment = method;
            
            document.querySelectorAll('.payment-option').forEach(btn => {
                btn.classList.remove('active');
            });
            document.getElementById('payment' + method.charAt(0).toUpperCase() + method.slice(1)).classList.add('active');
            
            updatePaymentDetails();
        }

        function updatePaymentDetails() {
            const detailsContainer = document.getElementById('paymentDetails');
            
            if (selectedPayment === 'card') {
                detailsContainer.innerHTML = `
                    <div class="form-group">
                        <label class="form-label">Número de Tarjeta</label>
                        <input type="text" class="form-input" placeholder="1234 5678 9012 3456">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Fecha de Vencimiento</label>
                            <input type="text" class="form-input" placeholder="MM/AA">
                        </div>
                        <div class="form-group">
                            <label class="form-label">CVV</label>
                            <input type="text" class="form-input" placeholder="123">
                        </div>
                    </div>
                `;
            } else if (selectedPayment === 'sinpe') {
                detailsContainer.innerHTML = `
                    <p style="color: #6b7280; margin-bottom: 1rem;">Por favor envía el pago a:</p>
                    <div class="payment-info-box">
                        <p class="info-label">Número de Teléfono</p>
                        <p class="info-value">+506 8888-8888</p>
                    </div>
                `;
            } else {
                detailsContainer.innerHTML = `
                    <p style="color: #6b7280; margin-bottom: 1rem;">Por favor transfiere a la siguiente cuenta:</p>
                    <div class="payment-info-box">
                        <div style="margin-bottom: 0.5rem;">
                            <p class="info-label">Banco</p>
                            <p>Banco Nacional</p>
                        </div>
                        <div>
                            <p class="info-label">Número de Cuenta</p>
                            <p>CR12345678901234567890</p>
                        </div>
                    </div>
                `;
            }
        }

        function handleConfirmPurchase() {
            alert('¡Compra confirmada! Gracias por comprar en Bellas Boutique.');
            clearCart();
            window.location.href = 'index.html';
        }

        renderCheckout();
    </script>
</body>
</html>
