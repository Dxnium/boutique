<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bellas Boutique - Detalle del Producto</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">Bellas Boutique</a>
            <div class="nav-links">
                <a href="index.html" class="nav-link">
                    <span>🏠</span>
                    <span class="nav-text">Inicio</span>
                </a>
                <a href="support.html" class="nav-link">
                    <span>❓</span>
                    <span class="nav-text">Soporte</span>
                </a>
                <a href="cart.html" class="nav-link cart-link">
                    <span>🛒</span>
                    <span class="nav-text">Carrito</span>
                    <span class="cart-badge" id="cartBadge">0</span>
                </a>
                <a href="profile.html" class="nav-link">
                    <span>👤</span>
                    <span class="nav-text">Perfil</span>
                </a>
            </div>
        </div>
    </nav>

    <div class="product-detail-container">
        <a href="index.html" class="back-btn">
            <span>←</span> Volver a productos
        </a>

        <div class="product-detail-card">
            <div class="product-detail-grid" id="productDetail"></div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="cart-utils.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const productId = parseInt(urlParams.get('id'));
        const product = products.find(p => p.id === productId);

        if (product) {
            document.getElementById('productDetail').innerHTML = `
                <div>
                    <img 
                        src="${product.image}" 
                        alt="${product.name}" 
                        class="product-detail-image"
                    >
                </div>
                <div class="product-detail-info">
                    <h1 class="product-detail-title">${product.name}</h1>
                    <p class="product-detail-category">${product.category}</p>
                    <p class="product-detail-price">$${product.price.toFixed(2)}</p>
                    <p class="product-detail-description">${product.description}</p>
                    <div class="button-group">
                        <button class="btn btn-primary" onclick="handleAddToCartAndNavigate()">
                            Agregar al Carrito
                        </button>
                        <button class="btn btn-outline" onclick="window.location.href='index.html'">
                            Seguir Comprando
                        </button>
                    </div>
                </div>
            `;
        } else {
            document.getElementById('productDetail').innerHTML = `
                <div style="text-align: center; padding: 4rem;">
                    <h2 style="font-size: 1.5rem; margin-bottom: 1rem;">Producto no encontrado</h2>
                    <button class="btn btn-primary" onclick="window.location.href='index.html'">
                        Volver al Inicio
                    </button>
                </div>
            `;
        }

        function handleAddToCartAndNavigate() {
            addToCart(product);
            window.location.href = 'cart.html';
        }
    </script>
</body>
</html>
