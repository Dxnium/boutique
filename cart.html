<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bellas Boutique - Carrito</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">Bellas Boutique</a>
            <div class="nav-links">
                <a href="index.html" class="nav-link">
                    <span>🏠</span>
                    <span class="nav-text">Inicio</span>
                </a>
                <a href="support.html" class="nav-link">
                    <span>❓</span>
                    <span class="nav-text">Soporte</span>
                </a>
                <a href="cart.html" class="nav-link cart-link">
                    <span>🛒</span>
                    <span class="nav-text">Carrito</span>
                    <span class="cart-badge" id="cartBadge">0</span>
                </a>
                <a href="profile.html" class="nav-link">
                    <span>👤</span>
                    <span class="nav-text">Perfil</span>
                </a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div id="cartContent"></div>
    </div>

    <script src="data.js"></script>
    <script src="cart-utils.js"></script>
    <script>
        function renderCart() {
            const cart = getCart();
            const container = document.getElementById('cartContent');

            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h2>Tu carrito está vacío</h2>
                        <p>Comienza a comprar para agregar artículos a tu carrito</p>
                        <button class="btn btn-primary" onclick="window.location.href='index.html'">
                            Ver Productos
                        </button>
                    </div>
                `;
                return;
            }

            const total = getCartTotal();

            container.innerHTML = `
                <h1 class="page-title">Carrito de Compras</h1>
                <div class="cart-layout">
                    <div class="cart-items" id="cartItems"></div>
                    <div class="order-summary">
                        <h2 class="summary-title">Resumen de Pedido</h2>
                        <div class="summary-row">
                            <span>Subtotal</span>
                            <span>$${total.toFixed(2)}</span>
                        </div>
                        <div class="summary-row">
                            <span>Envío</span>
                            <span>Gratis</span>
                        </div>
                        <hr class="summary-divider">
                        <div class="summary-total">
                            <span>Total</span>
                            <span class="total-amount">$${total.toFixed(2)}</span>
                        </div>
                        <button class="btn btn-primary" onclick="window.location.href='checkout.html'">
                            Proceder al Pago
                        </button>
                    </div>
                </div>
            `;

            const cartItemsContainer = document.getElementById('cartItems');
            cartItemsContainer.innerHTML = cart.map(item => `
                <div class="cart-item">
                    <div class="cart-item-content">
                        <img src="${item.image}" alt="${item.name}" class="cart-item-image">
                        <div class="cart-item-details">
                            <h3 class="cart-item-name">${item.name}</h3>
                            <p class="cart-item-category">${item.category}</p>
                            <p class="cart-item-price">$${item.price.toFixed(2)}</p>
                        </div>
                        <div class="cart-item-actions">
                            <button class="delete-btn" onclick="handleRemove(${item.id})">🗑️</button>
                            <div class="quantity-controls">
                                <button class="quantity-btn" onclick="handleUpdateQuantity(${item.id}, ${item.quantity - 1})">−</button>
                                <span class="quantity-value">${item.quantity}</span>
                                <button class="quantity-btn" onclick="handleUpdateQuantity(${item.id}, ${item.quantity + 1})">+</button>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function handleUpdateQuantity(productId, newQuantity) {
            updateQuantity(productId, newQuantity);
            renderCart();
        }

        function handleRemove(productId) {
            removeFromCart(productId);
            renderCart();
        }

        renderCart();
    </script>
</body>
</html>
