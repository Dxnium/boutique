<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrito de Compras - Bellas Boutique</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="navbar-container">
      <a href="index.html" class="navbar-brand">Bellas Boutique</a>
      <div class="navbar-links">
        <a href="index.html">
          <span>Inicio</span>
        </a>
        <a href="support.html">
          <span>Soporte</span>
        </a>
        <a href="cart.html" class="cart-badge">
          <span>Carrito</span>
          <span class="cart-count" id="cartCount">0</span>
        </a>
        <a href="login.html">
          <span>Perfil</span>
        </a>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="container">
    <h1 class="mb-8">Carrito de Compras</h1>

    <div id="cartContainer">
      <!-- Cart content will be loaded here -->
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      displayCart();
      updateCartCount();
    });

    function displayCart() {
      const cart = getCart();
      const container = document.getElementById('cartContainer');

      if (cart.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <h2>Tu carrito está vacío</h2>
            <p>Comienza a comprar para agregar artículos a tu carrito</p>
            <a href="index.html" class="btn btn-primary">Ver Productos</a>
          </div>
        `;
        return;
      }

      const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);

      container.innerHTML = `
        <div class="cart-grid">
          <div class="cart-items">
            ${cart.map(item => `
              <div class="cart-item">
                <img src="${item.image}" alt="${item.name}" class="cart-item-image">
                <div class="cart-item-info">
                  <h3 class="cart-item-title">${item.name}</h3>
                  <p class="cart-item-category">${item.category}</p>
                  <p class="cart-item-price">$${item.price.toFixed(2)}</p>
                </div>
                <div class="cart-item-actions">
                  <button class="btn-icon" onclick="removeFromCart(${item.id}); displayCart(); updateCartCount();" style="color: #ef4444;">
                    🗑️
                  </button>
                  <div class="quantity-selector">
                    <button class="quantity-btn" onclick="updateQuantity(${item.id}, ${item.quantity - 1}); displayCart(); updateCartCount();">
                      −
                    </button>
                    <span class="quantity-value">${item.quantity}</span>
                    <button class="quantity-btn" onclick="updateQuantity(${item.id}, ${item.quantity + 1}); displayCart(); updateCartCount();">
                      +
                    </button>
                  </div>
                </div>
              </div>
            `).join('')}
          </div>
          
          <div>
            <div class="summary-card">
              <h2 class="summary-title">Resumen de Pedido</h2>
              
              <div class="summary-row">
                <span>Subtotal</span>
                <span>$${total.toFixed(2)}</span>
              </div>
              <div class="summary-row">
                <span>Envío</span>
                <span>Gratis</span>
              </div>
              
              <div class="summary-divider"></div>
              
              <div class="summary-total">
                <span>Total</span>
                <span class="summary-total-amount">$${total.toFixed(2)}</span>
              </div>
              
              <a href="checkout.html" class="btn btn-primary btn-full">Proceder al Pago</a>
            </div>
          </div>
        </div>
      `;
    }
  </script>
</body>
</html>
